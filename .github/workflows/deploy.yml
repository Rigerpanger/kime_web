name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build
        env:
          VITE_API_URL: "/api"
          # Больше не нужны ключи Supabase для сборки фронтенда!

      - name: Deploy Frontend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*"
          target: "/var/www/kimeproducti_usr/data/www/kimeproduction.ru"
          strip_components: 1

      - name: Deploy Backend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "server/*"
          target: "/var/www/kimeproducti_usr/data/www/kime-api"
          strip_components: 0

      - name: Initialize Server (First time/Updates)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,OPENAI_API_KEY
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          script: |
            mkdir -p /var/www/kimeproducti_usr/data/www/kime-api/server
            cd /var/www/kimeproducti_usr/data/www/kime-api/server
            npm install
            # Создаем .env безопасно через переменные окружения
            echo "DB_USER=$DB_USER" > .env
            echo "DB_PASSWORD=$DB_PASSWORD" >> .env
            echo "DB_NAME=$DB_NAME" >> .env
            echo "DB_HOST=localhost" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
            
            # Перезапуск сервера через PM2
            pm2 restart kime-api || pm2 start index.js --name kime-api
